<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Business Management Dashboard</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Hind+Siliguri:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- FontAwesome Icons -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    
    <!-- CSS Modules -->
    <link rel="stylesheet" href="css/variables.css">
    <link rel="stylesheet" href="css/layout.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/responsive.css">
    
    <!-- Chart.js -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>
<body>

    <div class="app-container">
        <!-- Sidebar -->
        <aside class="sidebar">
            <div class="sidebar-header">
                <div class="sidebar-logo">
                    <i class="fas fa-cube"></i>
                </div>
                <div class="sidebar-title">Manage<span style="color:var(--accent-teal)">Pro</span></div>
            </div>

            <div class="sidebar-user">
                <img src="https://ui-avatars.com/api/?name=Admin+User&background=00D4AA&color=fff" alt="User" class="user-avatar">
                <div class="user-info">
                    <span class="user-name">Admin User</span>
                    <span class="user-role">Owner</span>
                </div>
                <i class="fas fa-chevron-down" style="margin-left: auto; font-size: 12px; color: var(--text-sidebar);"></i>
            </div>

            <nav class="nav-menu" id="navMenu">
                <a class="nav-item active" data-route="dashboard">
                    <i class="fas fa-home"></i> <span>Dashboard</span>
                </a>
                <a class="nav-item" data-route="inventory">
                    <i class="fas fa-box"></i> <span>পণ্য (Inventory)</span>
                </a>
                <a class="nav-item" data-route="suppliers">
                    <i class="fas fa-truck"></i> <span>সরবরাহকারী</span>
                </a>
                <a class="nav-item" data-route="customers">
                    <i class="fas fa-users"></i> <span>গ্রাহক</span>
                </a>
                <a class="nav-item" data-route="sales">
                    <i class="fas fa-shopping-cart"></i> <span>বিক্রয়</span>
                </a>
                <a class="nav-item" data-route="expenses">
                    <i class="fas fa-wallet"></i> <span>খরচ</span>
                </a>
                <a class="nav-item" data-route="loyalty">
                    <i class="fas fa-star"></i> <span>লয়্যালটি</span>
                </a>
                <a class="nav-item" data-route="service">
                    <i class="fas fa-wrench"></i> <span>সার্ভিস</span>
                </a>
                <a class="nav-item" data-route="reports">
                    <i class="fas fa-chart-bar"></i> <span>রিপোর্ট</span>
                </a>
            </nav>

            <div class="sidebar-footer">
                <a class="nav-item" data-route="settings" style="padding:0">
                    <i class="fas fa-cog"></i> <span>সেটিংস</span>
                </a>
                <div style="display:flex; align-items:center; gap:8px; margin-top:16px; font-size: 13px;">
                    <span style="width:8px; height:8px; background:var(--success); border-radius:50%; display:inline-block;"></span>
                    <span style="color:var(--text-sidebar)">System Online</span>
                </div>
            </div>
        </aside>

        <!-- Main Content -->
        <main class="main-content">
            <!-- Topbar -->
            <header class="topbar">
                <div class="topbar-left">
                    <h1 class="page-title" id="pageTitle">Dashboard</h1>
                </div>
                <div class="topbar-right">
                    <!-- EN/BN Toggle -->
                    <button class="icon-btn" id="langToggle" title="Change Language">
                        <span style="font-weight:600; font-size:14px;">BN</span>
                    </button>
                    <!-- Dark Mode Toggle -->
                    <button class="icon-btn" id="themeToggle" title="Toggle Theme">
                        <i class="fas fa-moon"></i>
                    </button>
                    <!-- Notifications -->
                    <button class="icon-btn" style="position:relative;">
                        <i class="far fa-bell"></i>
                        <span style="position:absolute; top:8px; right:8px; width:8px; height:8px; background:var(--danger); border-radius:50%;"></span>
                    </button>
                    <!-- Search -->
                    <button class="icon-btn">
                        <i class="fas fa-search"></i>
                    </button>
                </div>
            </header>

            <!-- Dynamic Content Area -->
            <div class="content-area" id="appRoot">
                <!-- Views will be loaded here -->
            </div>
        </main>
    </div>

    <!-- Core Scripts -->
    <script type="module" src="js/app.js"></script>
</body>
</html>
